services:
  - type: web
    name: slugger-pitching-widget
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r python_app/requirements.txt
    startCommand: gunicorn python_app.app:server --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: POINTSTREAK_API_KEY
        sync: false
      - key: ALPB_API_KEY
        sync: false
      - key: DASH_DEBUG
        value: "false"
